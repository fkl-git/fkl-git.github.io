<!DOCTYPE html>
<html>
<head>
  <title>Argument Mapper — Josh Michael Luistro</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<button id="theme-toggle" title="Toggle theme">🌙</button>

<div class="container">

  <h1>Argument Mapper</h1>
  <p>Enter a claim and Claude will break it into a structured argument map.</p>
  <hr>

  <section>
    <textarea id="claim" rows="3" placeholder="e.g. The ICC is ineffective"
      style="width:100%; padding:10px; font-family:inherit; font-size:1rem;
             border:1px solid var(--border); background:var(--bg);
             color:var(--text); resize:vertical;"></textarea>
    <button id="generate-btn" onclick="generateMap()"
      style="margin-top:12px;">Analyze claim →</button>
  </section>

  <section id="output" style="margin-top:2rem;"></section>

</div>

<script>
  // --- theme toggle (same logic as index.html) ---
  const toggle = document.getElementById("theme-toggle");
  let dark = false;
  toggle.addEventListener("click", () => {
    dark = !dark;
    document.body.classList.toggle("dark", dark);
    document.body.classList.toggle("light", !dark);
    toggle.textContent = dark ? "☀️" : "🌙";
  });

  // --- argument mapper ---
  async function generateMap() {
    const claim = document.getElementById("claim").value.trim();
    if (!claim) return;

    const output = document.getElementById("output");
    const btn = document.getElementById("generate-btn");

    output.innerHTML = "<p style='opacity:0.5'>Analyzing...</p>";
    btn.disabled = true;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are an expert in legal theory, philosophy, and structured argumentation. 
When given a claim, return a structured argument map in the following JSON format only — no preamble, no markdown fences:
{
  "claim": "the original claim",
  "supporting": ["argument 1", "argument 2", "argument 3"],
  "counterarguments": ["counterargument 1", "counterargument 2", "counterargument 3"],
  "evidence_slots": ["evidence type 1", "evidence type 2", "evidence type 3"],
  "verdict": "a one-sentence neutral assessment of the claim's overall strength"
}`,
          messages: [{ role: "user", content: claim }]
        })
      });

      const data = await response.json();
      const raw = data.content[0].text;
      const map = JSON.parse(raw);
      renderMap(map);

    } catch (err) {
      output.innerHTML = "<p style='color:red'>Something went wrong. Check your API key or try again.</p>";
    }

    btn.disabled = false;
  }

  function renderMap(map) {
    const section = (title, items, color) => `
      <div style="margin-bottom:2rem;">
        <h2 style="font-size:1rem; text-transform:uppercase; letter-spacing:0.08em;
                   color:${color}; margin-bottom:0.8rem;">${title}</h2>
        <ul style="padding-left:1.2rem; margin:0;">
          ${items.map(i => `<li style="margin-bottom:0.5rem; line-height:1.7;">${i}</li>`).join("")}
        </ul>
      </div>`;

    document.getElementById("output").innerHTML = `
      <hr>
      <div style="margin:2rem 0 1rem;">
        <p style="font-size:0.85rem; text-transform:uppercase; letter-spacing:0.08em;
                  opacity:0.5; margin-bottom:0.4rem;">Claim</p>
        <p style="font-size:1.15rem; font-weight:500;">${map.claim}</p>
      </div>
      ${section("Supporting Arguments", map.supporting, "var(--text)")}
      ${section("Counterarguments", map.counterarguments, "var(--text-secondary)")}
      ${section("Evidence Slots", map.evidence_slots, "var(--text-secondary)")}
      <div style="border-top:1px solid var(--border); padding-top:1.5rem; margin-top:1rem;">
        <p style="font-size:0.85rem; text-transform:uppercase; letter-spacing:0.08em;
                  opacity:0.5; margin-bottom:0.4rem;">Verdict</p>
        <p style="line-height:1.8;">${map.verdict}</p>
      </div>`;
  }
</script>

</body>
</html>
