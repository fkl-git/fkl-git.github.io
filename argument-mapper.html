<!DOCTYPE html>
<html>
<head>
  <title>Argument Mapper — Josh Michael Luistro</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<button id="theme-toggle" title="Toggle theme">🌙</button>

<div class="container">

  <h1>Argument Mapper</h1>
  <p>Enter a claim and Claude will break it into a structured argument map.</p>
  <hr>

  <section>
    <textarea id="claim" rows="3" placeholder="e.g. The ICC is ineffective"
      style="width:100%; padding:10px; font-family:inherit; font-size:1rem;
             border:1px solid var(--border); background:var(--bg);
             color:var(--text); resize:vertical;"></textarea>
    <button id="generate-btn" onclick="generateMap()"
      style="margin-top:12px;">Analyze claim →</button>
  </section>

  <section id="output" style="margin-top:2rem;"></section>

</div>

<script>
  // --- theme toggle (same logic as index.html) ---
  const toggle = document.getElementById("theme-toggle");
  let dark = false;
  toggle.addEventListener("click", () => {
    dark = !dark;
    document.body.classList.toggle("dark", dark);
    document.body.classList.toggle("light", !dark);
    toggle.textContent = dark ? "☀️" : "🌙";
  });

  // --- argument mapper ---
  async function generateMap() {
  const claim = document.getElementById("claim").value.trim();
  if (!claim) return;

  const output = document.getElementById("output");
  const btn = document.getElementById("generate-btn");

  output.innerHTML = "<p style='opacity:0.5'>Analyzing...</p>";
  btn.disabled = true;

  try {
    const response = await fetch("https://your-worker-name.your-subdomain.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ claim })
    });

    const data = await response.json();

    const raw = data.candidates[0].content.parts[0].text;
    const map = JSON.parse(raw);
    renderMap(map);

  } catch (err) {
    output.innerHTML = "<p style='color:red'>Something went wrong. Check your API key or try again.</p>";
  }

  btn.disabled = false;
}
</script>

</body>
</html>
